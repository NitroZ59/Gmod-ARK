<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle, #1a2a3a 0%, #050505 100%);
            color: white;
        }

        .container {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center;
        }

        /* En-tête Team */
        .subtitle { font-size: 1.1em; opacity: 0.5; letter-spacing: 6px; margin-bottom: 5px; }
        h1 { 
            font-size: 5.5em; 
            margin: 0; 
            letter-spacing: 10px;
            color: #ffffff;
            text-shadow: 0 0 35px rgba(52, 152, 219, 0.7);
            font-weight: 900;
        }

        /* Infos Joueur (Nouveauté) */
        .player-info {
            margin-top: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: #3498db;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-left: 3px solid #3498db;
            text-transform: uppercase;
        }

        /* Encadré Map */
        .map-box {
            margin-top: 30px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .map-image {
            width: 300px; height: 160px;
            background: #111;
            display: flex; align-items: center; justify-content: center;
            border-radius: 2px; border: 1px solid rgba(52, 152, 219, 0.2);
        }
        #map-name {
            background: rgba(52, 152, 219, 0.15);
            color: #3498db; padding: 6px 0;
            font-weight: bold; font-size: 0.8em; letter-spacing: 2px;
        }

        /* Barre de chargement */
        .loader-bar {
            margin-top: 40px; width: 300px; height: 2px;
            background: rgba(255,255,255,0.05); overflow: hidden;
        }
        .progress {
            width: 100%; height: 100%; background: #3498db;
            animation: loading 2s infinite ease-in-out;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="subtitle">BIENVENUE CHEZ</div>
        <h1>ARKANGE FR</h1>
        
        <div class="player-info">
            SESSION AUTHENTIFIÉE : <span id="player-id">VÉRIFICATION...</span>
        </div>

        <div class="map-box">
            <div class="map-image">
                <span style="opacity: 0.2; font-size: 0.7em;">SYNC SUR LA MAP...</span>
            </div>
            <div id="map-name">CHARGEMENT...</div>
        </div>
        
        <div class="loader-bar"><div class="progress"></div></div>
    </div>

    <audio autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // Récupération de la Map
        const mapname = params.get('mapname');
        if (mapname) { document.getElementById('map-name').innerText = mapname.toUpperCase(); }

        // Récupération du SteamID
        const steamid = params.get('steamid');
        if (steamid && steamid !== "%s") { 
            document.getElementById('player-id').innerText = steamid; 
        } else {
            document.getElementById('player-id').innerText = "UTILISATEUR LOCAL";
        }
    </script>

</body>
</html>
