<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
            /* Un joli dégradé sombre au lieu d'une image */
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white;
        }

        .container {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center;
        }

        h1 { 
            font-size: 4.5em; 
            margin: 0; 
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(52, 152, 219, 0.5); 
        }

        p { font-size: 1.2em; opacity: 0.7; margin-top: 10px; text-transform: uppercase; }

        #mapdisplay { 
            font-weight: bold; 
            color: #3498db; 
            margin-top: 30px; 
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 5px;
        }

        /* Barre de chargement animée */
        .loader-bar {
            margin-top: 50px; width: 350px; height: 4px;
            background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
        }
        .progress {
            width: 100%; height: 100%; background: #3498db;
            animation: loading 2.5s infinite ease-in-out;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MON SERVEUR</h1>
        <p>Murder • Prop Hunt • Deathrun • Guess Who</p>
        
        <div id="mapdisplay">Chargement des ressources...</div>
        
        <div class="loader-bar">
            <div class="progress"></div>
        </div>
    </div>

    <audio autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mapname = params.get('mapname');
        if (mapname) {
            document.getElementById('mapdisplay').innerText = "MAP : " + mapname.toUpperCase();
        }
    </script>

</body>
</html>
